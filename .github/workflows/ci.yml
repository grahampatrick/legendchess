name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: sudo bash scripts/ci/install-stockfish.sh
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
        env:
          STOCKFISH_PATH: /usr/local/bin/stockfish
      - run: pnpm --filter @playthelegend/web exec playwright install --with-deps chromium
      - run: pnpm --filter @playthelegend/web e2e
        env:
          CI: 'true'

  database:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - run: supabase db start
      - run: supabase test db
